<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artyom Casino</title>

    <style>
        * {
           padding: 0;
           margin: 0;
        }

        /* --- 1. EASY EDIT ZONE: Change colors/sizes here --- */
        :root {
            transition: all 0.3s ease-in;
            background-color: #1a1a1a;
            --box-color: #222;
            --text-color: #fff;
            --accent-color: crimson; /* Button color */
            --slot-border: gold;
            --slot-bg: #fff;
            --slot-text: #000;
        }

        /* --- 2. Standard CSS --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .machine-container {
            border: 4px solid #444;
            padding: 40px;
            border-radius: 15px;
            background-color: var(--box-color);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            width: 500px;
        }

        .slots {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            background: #000;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #666;
            justify-content: center;
        }

        .reel {
            font-size: 60px;
            width: 80px;
            height: 80px;
            background-color: var(--slot-bg);
            color: var(--slot-text);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            border: 3px solid var(--slot-border);
        }

        #message {
            font-size: 18px;
            min-height: 60px;
            margin-bottom: 20px;
            color: #bbb;
            white-space: pre-wrap; 
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            width: 100%; /* Makes button fill the container width */
            margin-left: 50px;
        }

        .slot-container {
            display: flex;
            flex-direction: row;
        }

        button:hover { filter: brightness(1.2); }
        button:active { transform: scale(0.98); }

        .tickets {
            width: 80px;
            height: 80px;
        }

        .tickets-counter {
            width: 250px;
            display: flex;
            align-self: flex-end;
            flex-direction: row;
            justify-content: end;
            align-items: center;
            gap: 10px;
        }

        #tickets-multiplier {
            font-size: 30px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrapper {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20%;
            position: relative;
        }

        .store {
            position: absolute;
            background-color: #777;
            border-radius: 15px;
            height: 500px;
            width: 40%;
            font-family: Arial, Helvetica, sans-serif;
            overflow-y: scroll;
            z-index: 20;
            display: none;
        }

        .store-title {
            margin-top: 25px;
            display: inline-block;
            /* justify-self: center; */
        }

        .Purchase-button {
            text-decoration: none;
            color: #fff;
            display: block;
        }

        .close-button {
            color: red;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 25px;
            display: inline-block;
            position: absolute;
            right: 25px;
            top: 25px;
        }

        .store-header {
            width: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            background-color: #777;
            z-index: 10;
        }

        .purchase-container {
            display: block;
        }

        .outer-purchase-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-direction: row;
            margin-bottom: 30px;
        }

        .version-container {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: flex-end;
            position: absolute;
            bottom: 0;
            padding: 10px 20px;
            box-sizing: border-box;
        }

        .store-icon {
            width: 100px;
            left: -5px;
            position: relative;
            filter: invert(100%);
        }

        .store-button-container {
            display: flex;
            flex-direction: column;
            align-self: flex-start;
            justify-content: flex-start;
        }

        #storeButton {
            text-decoration: none;
            color: #fff;
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between
        }

        .build-container {
            display: block;
        }

        #patch-notes {
            display: block;
            text-decoration: none;
            color: #fff;
            text-align: end;
            transition: all 0.1s ease-in-out;
        }

        #patch-notes:hover {
            text-decoration: underline;
        }

        .version {
            display: block;
        }

        .debug {
            position: absolute;
            background-color: #000;
            color: #00ff2b;
            border-radius: 15px;
            height: 500px;
            width: 35%;
            font-family: Arial, Helvetica, sans-serif;
            overflow-y: scroll;
            z-index: 40;
            align-self: flex-start;
            max-width: 600px;
            display: none;
        }

        .debug-header {
            display: flex;
            flex-direction: row;
            padding-top: 15px;
        }

        #debug-close {
            margin-right: 40%;
            margin-left: 10%;
        }

        .debug-title {
            color:#00ff2b;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 550;
        }

        #debug-interface {
            display: none;
        }

        #debug-password-title {
            color:#00ff2b;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 500;
        }

        #debug-password {
            background-color: #000;
            border: #00ff2b 0.1px solid;
            border-radius: 2px;
            width: 250px;
            color: #00ff2b;
            margin-top: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 500;
        }

        #debug-password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .debug-text {
            color:#00ff2b;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 500;
        }

        #debug-proceed {
            margin-top: 50px;
        }

        .debug-subsubtitle {
            margin: 25px 0;
        }

        .debug-button {
            margin-right: 15px;
        }

        .img-250-tickets {
            width: fit-content;
        }

        .settings-container {
            display: flex;
            position: absolute;
            width: 150px;
            height: 200px;
            top: 20px;
            right: 20px;
            z-index: 10;
            flex-direction: column;
            align-items: center;
        }

        .settings-icon {
            width: 100px;
            height: 100px;
        }

        .settings-button {
            text-decoration: none;
            color: #fff;
        }

        .settings {
            display: none;
            position: absolute;
            background-color: #777;
            color: #fff;
            border-radius: 15px;
            height: 500px;
            width: 35%;
            font-family: Arial, Helvetica, sans-serif;
            z-index: 40;
            justify-self: center;
            flex-direction: column;
            align-items: center;
        }

        .settings-header {
            display: flex;
            flex-direction: row;
            padding-top: 15px;
            margin-bottom: 15px;
        }

        #settings-close {
            color: red;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 25px;
            display: inline-block;
            position: absolute;
            right: 25px;
            top: 25px;
            text-decoration: none;
        }

        .settings-text {
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
        }

        .settings-important {
            color: red;
        }

        .link {
            text-decoration: none;
            transition: all 0.1s ease-in-out;
        }

        .link:hover {
            text-decoration: underline;
        }

        .settings-interface {
            height: 100%;
        }


        .settings-button-container {
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            width: 100%;
            max-height: 100%;
            margin-top: 50px;
        }

        .settings-button {
            margin-bottom: 15px;
        }

        .warning-title {
            font-family: Arial, Helvetica, sans-serif;
            color: red;
            font-size: 50px;
            background-color: #666;
            padding: 15px;
        }

        .fine {
            text-decoration: none;
            color: #fff;
            display: block;
            background-color: yellow;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 600;
            font-size: 35px;
            padding: 5px 15px;
        }

        .fine:hover {
            text-decoration: underline;
        }

        #roadmap {
            display: block;
            text-decoration: none;
            color: #fff;
            text-align: start;
            transition: all 0.1s ease-in-out;
        }

        #roadmap:hover {
            text-decoration: underline;
        }

        /* Special class for winning text */
        .winner { color: gold !important; font-weight: bold; text-shadow: 0 0 10px yellow; }
    </style>
</head>

        <h2 class="warning-bottom">And never steal it again</h2>
        <a href="main.html" class="fine">Fine</a>

    <div class="version-container">
        <div class="build-container">
            <a href="roadmap.html" id="roadmap">Roadmap</a>
            <p class="version" id="version">Error -1</p>
        </div>
        <div class="build-container">
            <a href="patch-notes.html" id="patch-notes">Patch notes</a>
            <p class="version build" id="build">Error -1</p>
        </div>
    </div>
